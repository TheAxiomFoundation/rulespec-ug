    ug:statutes/act-2024-excise/excise-duty-amendment-2024#input.petrol_litres: 10
    ug:statutes/act-2024-excise/excise-duty-amendment-2024#input.diesel_litres: 5
  output:
    ug:statutes/act-2024-excise/excise-duty-amendment-2024#fuel_excise_duty: 21650
