    ? ug:statutes/act-2012-4/income-tax-amendment-2012/third-schedule-rates-of-tax-substituted#resident_individual_income_tax_before_additional_tax
    : 60000
    ? ug:statutes/act-2012-4/income-tax-amendment-2012/third-schedule-rates-of-tax-substituted#additional_tax_on_chargeable_income
    : 0
    ug:statutes/act-2012-4/income-tax-amendment-2012/third-schedule-rates-of-tax-substituted#resident_individual_income_tax: 60000
