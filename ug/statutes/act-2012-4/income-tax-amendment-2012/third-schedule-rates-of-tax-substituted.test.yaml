# Companion fixtures for the Act 4 of 2012 substituted Third Schedule
# (Income Tax Act, Cap. 340) individual rate tables. The first seven
# cases are codex-generated (run 1f763f1e) and hand-verified; the
# FY2025/26 cases below are orchestrator-computed from the verbatim
# band bounds in the cited corpus provision per the interim convention
# in axiom-encode#1060, then verified digit-by-digit through the engine.
#
# Resident annual schedule (Part I para 1): nil <= 2,820,000; 10% to
# 4,020,000; 20% to 4,920,000 (cumulative 120,000 + 180,000 = 300,000);
# 30% above; additional 10% on chargeable income exceeding 120,000,000.
# Non-resident (para 2): 10% from zero to 4,020,000 (402,000); 20% to
# 4,920,000 (582,000); 30% above; same additional 10%.
# Validation year FY2025/26 (Uganda tax year runs 1 July-30 June); the
# schedule is unchanged from 1 July 2012 through FY2025/26 (the
# 2014-2024 amendment prints do not touch Part I).
#
# UGAMOD cross-check (SOUTHMOD A4.0, UG_2025, probed live): a formal
# employee at monthly yem 518,781.30 (annual 6,225,375.60) returns
# tin_s 57,634.37/month = 691,612.68/year, and the statutory chain
# below gives 300,000 + 30% x (6,225,375.60 - 4,920,000) = 691,612.68.

