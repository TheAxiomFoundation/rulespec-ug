  - name: resident_individual_income_tax_before_additional_tax
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: UGX
    source: Third Schedule, Part I, paragraph 1(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: ug/statute/act-2012-4/income-tax-amendment-2012/third-schedule-rates-of-tax-substituted
              excerpt: "The income tax rates applicable to resident individuals are— Chargeable income Rate of tax"
    versions:
      - effective_from: '2012-07-01'
        formula: |-
          if resident_individual_income_tax_band == 0: 0 else: if resident_individual_income_tax_band == 1: (chargeable_income - resident_band_lower_bound[1]) * resident_band_rate[1] else: if resident_individual_income_tax_band == 2: ((resident_band_upper_bound[1] - resident_band_lower_bound[1]) * resident_band_rate[1]) + ((chargeable_income - resident_band_lower_bound[2]) * resident_band_rate[2]) else: ((resident_band_upper_bound[1] - resident_band_lower_bound[1]) * resident_band_rate[1]) + ((resident_band_upper_bound[2] - resident_band_lower_bound[2]) * resident_band_rate[2]) + ((chargeable_income - resident_band_lower_bound[3]) * resident_band_rate[3])

