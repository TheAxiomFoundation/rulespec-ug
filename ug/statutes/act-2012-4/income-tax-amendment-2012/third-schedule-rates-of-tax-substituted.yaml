              excerpt: "an additional | | 10%: charged on the amount by which chargeable — income exceeds Ushs. 120,000,000"
    versions:
      - effective_from: '2012-07-01'
        formula: |-
          additional_tax_rate * max(0, chargeable_income - additional_tax_threshold)

  - name: resident_individual_income_tax
    kind: derived
