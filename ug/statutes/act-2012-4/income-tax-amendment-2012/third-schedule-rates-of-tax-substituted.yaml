        formula: |-
          if nonresident_individual_income_tax_band == 0: chargeable_income * nonresident_band_rate[0] else: if nonresident_individual_income_tax_band == 1: (nonresident_band_upper_bound[0] * nonresident_band_rate[0]) + ((chargeable_income - nonresident_band_lower_bound[1]) * nonresident_band_rate[1]) else: (nonresident_band_upper_bound[0] * nonresident_band_rate[0]) + ((nonresident_band_upper_bound[1] - nonresident_band_lower_bound[1]) * nonresident_band_rate[1]) + ((chargeable_income - nonresident_band_lower_bound[2]) * nonresident_band_rate[2])

