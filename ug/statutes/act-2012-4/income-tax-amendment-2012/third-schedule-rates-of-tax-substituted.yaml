format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: ug/statute/act-2012-4/income-tax-amendment-2012/third-schedule-rates-of-tax-substituted
  summary: |-
    Part 1. Income tax rates for individuals. The income tax rates applicable to resident individuals are: not exceeding Ushs 2,820,000, nil; exceeding Ushs 2,820,000 but not exceeding Ushs 4,020,000, 10%; exceeding Ushs 4,020,000 but not exceeding Ushs 4,920,000, 20%; exceeding Ushs 4,920,000, 30%; and where chargeable income exceeds Ushs. 120,000,000 an additional 10%. Nonresident individuals: not exceeding Ushs. 4,020,000, 10%; exceeding Ushs. 4,020,000 but not exceeding Ushs. 4,920,000, 20%; exceeding Ushs.4.920,000, 30%; and the same additional 10% above Ushs. 120,000,000.
rules:
  - name: resident_individual_income_tax_band
    kind: derived
    entity: Person
    dtype: Integer
    period: Year
    source: Third Schedule, Part I, paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter_table
            source:
              corpus_citation_path: ug/statute/act-2012-4/income-tax-amendment-2012/third-schedule-rates-of-tax-substituted
              excerpt: "Not exceeding Ushs 2,820,000 | Nil Exceeding Ushs. 2,820,000 but not) 10%"
              table:
                header: "resident individual income tax rates"
                row_key: "chargeable_income"
                column_key: "band_bounds"
          - path: versions[0].formula
            kind: parameter_table
            source:
              corpus_citation_path: ug/statute/act-2012-4/income-tax-amendment-2012/third-schedule-rates-of-tax-substituted
              excerpt: "Exceeding Ushs. 4.020.000 but not] Ushs. {20,000 plus 20%"
              table:
                header: "resident individual income tax rates"
                row_key: "chargeable_income"
                column_key: "band_bounds"
          - path: versions[0].formula
            kind: parameter_table
            source:
              corpus_citation_path: ug/statute/act-2012-4/income-tax-amendment-2012/third-schedule-rates-of-tax-substituted
              excerpt: "Exceeding Ushs. 4,920,000 ia) Ushs 300.000 plus 30%"
              table:
                header: "resident individual income tax rates"
                row_key: "chargeable_income"
                column_key: "band_bounds"
    versions:
      - effective_from: '2012-07-01'
        formula: |-
          if chargeable_income <= resident_band_upper_bound[0]: 0 else: if chargeable_income <= resident_band_upper_bound[1]: 1 else: if chargeable_income <= resident_band_upper_bound[2]: 2 else: 3

