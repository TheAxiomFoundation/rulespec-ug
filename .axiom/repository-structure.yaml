version: 1
allowed_root_directories:
  - .axiom
  - .github
  - bulk
  - data
  - ug/programs
  - docs
  - tests
  - ug
allowed_root_files:
  - .gitignore
  - CLAUDE.md
  - ENCODING-GAPS.md
  - README.md
  - known-missing-money-atoms.yaml
  - known-validation-gaps.yaml
  - oracle-coverage-pending.yaml
  - variables.toml
path_rules:
  - patterns:
      - ".axiom/**"
    allow_extensions:
      - ".json"
      - ".txt"
      - ".toml"
      - ".yaml"
  - patterns:
      - ".github/**"
    allow_extensions:
      - ".yml"
      - ".yaml"
      - ".md"
  - patterns:
      - "bulk/**"
    allow_extensions:
      - ".md"
      - ".py"
      - ".yaml"
  - patterns:
      - "data/**"
    allow_extensions:
      - ".json"
      - ".jsonl"
      - ".yaml"
      - ".yml"
  - patterns:
      - "ug/programs/**"
    allow_extensions:
      - ".yaml"
  - patterns:
      - "docs/**"
    allow_extensions:
      - ".md"
  - patterns:
      - "tests/**"
    allow_extensions:
      - ".py"
  - patterns:
      - "ug/**"
    allow_extensions:
      - ".yaml"
    allow_filenames:
      - ".gitkeep"
